name: Terrascan Code Scan 

on:
  schedule:
    # Runs every Monday at 9 AM UTC (weekly)
    - cron:  '0 9 * * 1'
  push:

permissions:
  contents: read
  security-events: write

jobs:
  terrascan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        iac_type: [terraform, cft]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List IaC files in ${{ matrix.iac_type }}
        run: |
          echo "Scanning contents of ./${{ matrix.iac_type }}"
          find ${{ matrix.iac_type }} -type f \( -name "*.tf" -o -name "*.yaml" -o -name "*.yml" -o -name "*.json" \) || echo "No files found."

      - name: Run Terrascan
        id: terrascan
        uses: tenable/cloud-security-actions/iac/scan@v1
        with:
          api-token: ${{ secrets.TENABLE_API_TOKEN }}
          api-url: https://us2.app.ermetic.com
          types: ${{ matrix.iac_type == 'cft' && 'CloudFormation' || 'Terraform' }}
          path: ${{ matrix.iac_type }}
          output-file-formats: sarif
          output-file-name: terrascan
          fail-on-min-severity: Critical

      - name: Check SARIF output
        run: |
          if [ ! -s terrascan.sarif ]; then
            echo "⚠️ terrascan.sarif not found or empty for ${{ matrix.iac_type }}. Skipping upload."
            exit 0
          fi
          echo "✅ terrascan.sarif exists and is non-empty."

      - name: Fix SARIF URI schemes for GitHub Code Scanning
        if: success()
        run: |
          if [ -f terrascan.sarif ]; then
            chmod 666 terrascan.sarif
            python3 << 'EOF'
          import json
          import re
          
          with open('terrascan.sarif', 'r') as f:
              sarif = json.load(f)
          
          # Fix URI schemes in all results
          for run in sarif.get('runs', []):
              for result in run.get('results', []):
                  for location in result.get('locations', []):
                      physical_location = location.get('physicalLocation', {})
                      artifact_location = physical_location.get('artifactLocation', {})
                      
                      if 'uri' in artifact_location:
                          uri = artifact_location['uri']
                          # Extract just the file path from https:// URIs
                          if uri.startswith('https://'):
                              # Extract the path after the domain/repo
                              match = re.search(r'https://[^/]+/[^/]+/[^/]+/(.+)', uri)
                              if match:
                                  artifact_location['uri'] = match.group(1)
                              else:
                                  # Fallback: just take everything after last domain segment
                                  artifact_location['uri'] = uri.split('/')[-1]
          
          with open('terrascan_fixed.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          
          print("✅ Fixed SARIF URI schemes")
          EOF
            mv terrascan_fixed.sarif terrascan.sarif
          fi

      - name: Upload SARIF to GitHub
        if: success()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: terrascan.sarif
          category: ${{ matrix.iac_type }}

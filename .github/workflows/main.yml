on:
  schedule:
    # Runs every Monday at 9 AM UTC (weekly)
    - cron:  '0 9 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan IaC with Tenable Cloud Security
        uses: tenable/cloud-security-actions/iac/scan@v1
        with:
          api-token: ${{ secrets.TENABLE_API_TOKEN }}
          api-url: https://us2.app.ermetic.com
          types: Terraform,CloudFormation
          path: .
          fail-on-min-severity: Critical
